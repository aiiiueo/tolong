<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Weekly Coding Challenge #1 -  Double slider Sign in/up Form - Desktop Only</title>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css'><link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="container" id="container">
	<div class="form-container sign-up-container">
		<form action="#">
			<h1>Buat Akun</h1>
			<div class="social-container">
				<a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
				<a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
				<a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
			</div>
			<span>atau gunakan email untuk registrasi</span>
			<input type="text" id="reg-username" placeholder="Nama" required/>
			<input type="email" id="reg-email" placeholder="Email" />
			<input type="password" id="reg-password" placeholder="Password" required/>
			<button>Registrasi</button>
		</form>
	</div>
	<div class="form-container sign-in-container">
		<form action="#" id="loginForm">
			<h1>Log in</h1>
			<div class="social-container">
				<a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
				<a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
				<a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
			</div>
			<span>atau gunakan akun anda</span>
			<input type="text" id="username" placeholder="Nama" required/>
			<input type="password" id="password" placeholder="Password" required/>
			<a href="loginForm">Forgot your password?</a>
			<!-- <p id="message"></p> -->
			<button type="submit">Sign In</button>
			<button onclick="locatiaon.href='../index.html';">home</button>
			<div id="alertBox" class="alert" style="display:none;"></div>
		</form>
	</div>
	<div class="overlay-container">
		<div class="overlay">
			<div class="overlay-panel overlay-left">
				<h1>Welcome Back!</h1>
				<p>To keep connected with us please login with your personal info</p>
				<button class="ghost" id="signIn">Sign In</button>
			</div>
			<div class="overlay-panel overlay-right">
				<h1>Hello, Friend!</h1>
				<p>Enter your personal details and start journey with us</p>
				<button class="ghost" id="signUp">Sign Up</button>
			</div>
		</div>
	</div>
</div>


    <script  src="./script.js"></script>
	 <script src="js/login.js"></script>
	  <p id="message"></p>
	  <script src="js/register.js"></script>
  </body>
  
</html>
